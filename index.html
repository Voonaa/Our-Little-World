<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Little World | Agus & Cesya LDR Story</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- The WebGL Canvas -->
    <canvas id="webgl"></canvas>

    <!-- Cinematic Black Bars -->
    <div class="cinematic-bar top"></div>
    <div class="cinematic-bar bottom"></div>

    <!-- Start / Loading Screen -->
    <div id="splash-screen" class="overlay-screen active">
      <div class="splash-content">
        <h1 class="splash-title">Our Little World</h1>
        <p class="splash-subtitle">A collection of memories & love drifting in the dawn sky</p>
        
        <div class="loading-container">
          <div class="loading-bar-bg">
            <div id="loading-bar" class="loading-bar"></div>
          </div>
          <span id="loading-text" class="loading-text">Establishing connection...</span>
        </div>

        <button id="start-btn" class="start-btn hidden">Enter Our World</button>
      </div>
    </div>

    <!-- Polaroid Memory Overlay -->
    <div id="memory-overlay" class="memory-overlay hidden">
      <div class="polaroid-wrapper">
        <div class="polaroid">
          <div class="polaroid-image-container">
            <div id="polaroid-illustration" class="polaroid-illustration"></div>
          </div>
          <div class="polaroid-content">
            <h2 id="memory-title" class="memory-title">First Day We Met</h2>
            <p id="memory-date" class="memory-date">June 26, 2024</p>
            <p id="memory-description" class="memory-description">Memory description...</p>
          </div>
        </div>
        <button id="close-memory-btn" class="close-btn">&times; Back to World</button>
      </div>
    </div>

    <!-- HUD Overlay -->
    <div id="hud" class="hud-container hidden">
      <!-- Music Controller -->
      <button id="music-toggle" class="hud-btn music-btn" aria-label="Toggle Music">
        <svg viewBox="0 0 24 24" class="icon-music" fill="currentColor">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <span class="music-wave">
          <span></span><span></span><span></span><span></span>
        </span>
      </button>

      <!-- Left-side Chapters Pane -->
      <div class="chapter-controller">
        <span class="hud-label">Chapters</span>
        <div class="chapter-buttons">
          <button class="chapter-btn active" data-chapter="0">Ch 0: Start</button>
          <button class="chapter-btn" data-chapter="1">Ch 1: Garden</button>
          <button class="chapter-btn" data-chapter="2">Ch 2: House</button>
          <button class="chapter-btn" data-chapter="3">Ch 3: Islands</button>
          <button class="chapter-btn" data-chapter="4">Ch 4: Bridge</button>
          <button class="chapter-btn" data-chapter="5">Ch 5: Dreams</button>
        </div>
      </div>

      <!-- Right-side Weather Switcher Pane -->
      <div class="time-controller">
        <span class="hud-label">Atmosphere</span>
        <div class="time-buttons">
          <button id="time-sunny" class="time-btn" data-time="sunny">Sunny</button>
          <button id="time-golden" class="time-btn" data-time="golden">Sunset</button>
          <button id="time-rain" class="time-btn" data-time="rain">Rain</button>
          <button id="time-fog" class="time-btn" data-time="fog">Fog</button>
          <button id="time-night" class="time-btn" data-time="night">Night</button>
          <button id="time-stars" class="time-btn" data-time="stars">Stars</button>
        </div>
      </div>

      <!-- Memory Discovery tracker -->
      <div class="memory-tracker">
        <span class="tracker-title">Anniversaries Explored</span>
        <div class="tracker-progress-wrapper">
          <div class="tracker-progress">
            <div id="tracker-fill" class="tracker-fill" style="width: 0%;"></div>
          </div>
          <span id="tracker-text" class="tracker-text">0 / 7</span>
        </div>
      </div>

      <!-- Bottom cinematic captions -->
      <div id="captions" class="cinematic-caption"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
